<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/alte-haas-grotesk" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;--ink:#0a0a0a;--muted:#8a8a8a;--faint:#bcbcbc;--line:rgba(0,0,0,.06);--line2:rgba(0,0,0,.14);
  --spot:#f3f1ed;--sans:'AlteHaasGrotesk','Alte Haas Grotesk','Helvetica Neue',Arial,sans-serif;--dev:'Noto Sans Devanagari',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;padding-bottom:104px}
a{color:inherit;text-decoration:none}
.dev{font-family:var(--dev)}

/* top bar: back · logo · search+cart (reference structure) */
.topbar{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
  display:grid;grid-template-columns:44px 1fr 84px;align-items:center;padding:15px 16px 13px;border-bottom:1px solid var(--line)}
.topbar button{background:none;border:0;cursor:pointer;color:var(--ink);display:flex;padding:0;align-items:center}
.topbar .logo{height:21px;width:auto;margin:0 auto}
.topbar .right{display:flex;gap:18px;justify-content:flex-end}

/* each parent = a band (reference: eyebrow over centred name) */
.band{padding:26px 0 22px}
.band+.band{border-top:1px solid var(--line)}
.pcat{text-align:center;font-size:12px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}

/* sub-category selector — EXPANDED centre-fade (many visible, gradient out) */
.subs{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  padding:4px 46vw 10px;scrollbar-width:none;align-items:center}
.subs::-webkit-scrollbar{display:none}
.sub{scroll-snap-align:center;flex:none;padding:0 15px;cursor:pointer;white-space:nowrap;text-align:center;
  font-size:14px;font-weight:600;letter-spacing:.01em;color:var(--ink);transform-origin:center center;
  transition:opacity .28s ease,transform .28s ease,font-weight .28s ease;transform:scale(.82);opacity:.16}

/* product carousel with centre spotlight (reference) */
.rail{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  padding:16px 27vw 4px;scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.prod{scroll-snap-align:center;flex:none;width:46vw;max-width:200px;cursor:pointer;text-align:center;
  transition:transform .35s cubic-bezier(.2,.7,.2,1),opacity .35s;transform:scale(.78);opacity:.4}
.prod.active{transform:scale(1);opacity:1}
.prod .shot{position:relative;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.prod .shot::before{content:"";position:absolute;width:84%;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle,var(--spot) 0%,var(--spot) 56%,rgba(243,241,237,0) 72%);opacity:0;transition:opacity .35s;z-index:0}
.prod.active .shot::before{opacity:1}
.prod .shot svg{position:relative;z-index:1;width:72%;height:72%}
.prod .shot img.ph-img{position:relative;z-index:1;width:90%;height:90%;object-fit:contain}
.prod .b{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:3px;opacity:0;transition:opacity .3s}
.prod.active .b{opacity:1}
.prod .n{font-size:12.5px;font-weight:500;line-height:1.2;margin-bottom:3px}
.prod .pr{font-size:12px;font-weight:700}
.more{scroll-snap-align:center;flex:none;width:40vw;display:flex;align-items:center;justify-content:center;text-align:center}
.more a{display:flex;flex-direction:column;align-items:center;gap:9px}
.more .circ{width:56px;height:56px;border-radius:50%;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center}
.more span{font-size:9px;letter-spacing:.16em;text-transform:uppercase;font-weight:700}

/* floating bottom navigation (preserved from live app) */
.floatnav{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:90;display:flex;align-items:center;
  gap:4px;background:#fff;border-radius:100px;padding:8px 10px;box-shadow:0 12px 34px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.06);
  width:calc(100% - 28px);max-width:430px;justify-content:space-between}
.fn{background:none;border:0;cursor:pointer;color:#111;display:flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:100px;flex:none}
.fn.active{background:#0a0a0a;color:#fff;width:auto;padding:0 20px;gap:9px}
.fn.active span{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
</style></head><body>

function focusSubs(ci){
  var subs=document.getElementById('subs-'+ci);var r=subs.getBoundingClientRect();var cx=r.left+r.width/2;

}
